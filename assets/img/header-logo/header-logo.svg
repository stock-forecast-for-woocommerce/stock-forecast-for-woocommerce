<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 128 128">
  <!-- Background -->
  <rect x="12" y="12" width="104" height="104" rx="24" fill="#FFFFFF"/>
  <!-- Border -->
  <rect x="12" y="12" width="104" height="104" rx="24" fill="none" stroke="#E6E6E8" stroke-width="1"/>
  <!-- W (WooCommerce-style) - top right corner -->
  <path d="M74 21 L80 30 L87 23 L93 30 L100 23" fill="none" stroke="#3B82F6" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="30" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4 3" opacity="0.2"/>
  <!-- Inner circle -->
  <circle cx="64" cy="64" r="21" fill="#F8F7FA"/>
  <!-- Sales velocity arc -->
  <path d="M30 86 Q30 50 64 38 Q98 26 98 58" fill="none" stroke="#3B82F6" stroke-width="3" stroke-linecap="round" opacity="0.15"/>
  <!-- Forecast track -->
  <path d="M34 76 L54 63 L74 53 L92 47" fill="none" stroke="#2F3349" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Status lights -->
  <circle cx="34" cy="76" r="4.5" fill="#28C76F"/>
  <circle cx="34" cy="76" r="1.75" fill="#FFFFFF"/>
  <circle cx="54" cy="63" r="4.5" fill="#FF9F43"/>
  <circle cx="54" cy="63" r="1.75" fill="#FFFFFF"/>
  <circle cx="74" cy="53" r="4.5" fill="#FF4C51"/>
  <circle cx="74" cy="53" r="1.75" fill="#FFFFFF"/>
  <!-- Forecast endpoint -->
  <circle cx="92" cy="47" r="5.5" fill="#00BAD1"/>
  <circle cx="92" cy="47" r="2.25" fill="#FFFFFF"/>
  <!-- Pulse ring -->
  <circle cx="92" cy="47" r="9" fill="none" stroke="#00BAD1" stroke-width="1.5" opacity="0.35"/>
  <!-- WooCommerce tag (bottom right) -->
  <rect x="88" y="87" width="12" height="8" rx="1.5" fill="none" stroke="#3B82F6" stroke-width="1.25" opacity="0.5"/>
  <circle cx="94" cy="90" r="1" fill="#3B82F6" opacity="0.5"/>
  <!-- Product box (bottom left) -->
  <rect x="28" y="87" width="10" height="10" rx="2" fill="#28C76F" opacity="0.7"/>
  <line x1="28" y1="90" x2="38" y2="90" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
</svg>