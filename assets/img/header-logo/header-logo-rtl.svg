<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 128 128">
  <!-- Background -->
  <rect x="12" y="12" width="104" height="104" rx="24" fill="#FFFFFF"/>
  <!-- Border -->
  <rect x="12" y="12" width="104" height="104" rx="24" fill="none" stroke="#E6E6E8" stroke-width="1"/>
  <!-- W (WooCommerce-style) - top left corner (RTL) -->
  <path d="M54 21 L48 30 L41 23 L35 30 L28 23" fill="none" stroke="#3B82F6" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="30" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4 3" opacity="0.2"/>
  <!-- Inner circle -->
  <circle cx="64" cy="64" r="21" fill="#F8F7FA"/>
  <!-- Sales velocity arc (mirrored) -->
  <path d="M98 86 Q98 50 64 38 Q30 26 30 58" fill="none" stroke="#3B82F6" stroke-width="3" stroke-linecap="round" opacity="0.15"/>
  <!-- Forecast track (mirrored) -->
  <path d="M94 76 L74 63 L54 53 L36 47" fill="none" stroke="#2F3349" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Status lights -->
  <circle cx="94" cy="76" r="4.5" fill="#28C76F"/>
  <circle cx="94" cy="76" r="1.75" fill="#FFFFFF"/>
  <circle cx="74" cy="63" r="4.5" fill="#FF9F43"/>
  <circle cx="74" cy="63" r="1.75" fill="#FFFFFF"/>
  <circle cx="54" cy="53" r="4.5" fill="#FF4C51"/>
  <circle cx="54" cy="53" r="1.75" fill="#FFFFFF"/>
  <!-- Forecast endpoint -->
  <circle cx="36" cy="47" r="5.5" fill="#00BAD1"/>
  <circle cx="36" cy="47" r="2.25" fill="#FFFFFF"/>
  <!-- Pulse ring -->
  <circle cx="36" cy="47" r="9" fill="none" stroke="#00BAD1" stroke-width="1.5" opacity="0.35"/>
  <!-- WooCommerce tag (bottom left) -->
  <rect x="28" y="87" width="12" height="8" rx="1.5" fill="none" stroke="#3B82F6" stroke-width="1.25" opacity="0.5"/>
  <circle cx="34" cy="90" r="1" fill="#3B82F6" opacity="0.5"/>
  <!-- Product box (bottom right) -->
  <rect x="90" y="87" width="10" height="10" rx="2" fill="#28C76F" opacity="0.7"/>
  <line x1="90" y1="90" x2="100" y2="90" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
</svg>