<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect x="24" y="24" width="208" height="208" rx="48" fill="#FFFFFF"/>

  <!-- Border -->
  <rect x="24" y="24" width="208" height="208" rx="48" fill="none" stroke="#E6E6E8" stroke-width="2"/>

  <!-- W (WooCommerce-style) - top right corner -->
  <path d="M148 42 L160 60 L174 46 L186 60 L200 46"
        fill="none" stroke="#3B82F6" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="60" fill="none" stroke="#3B82F6" stroke-width="4" stroke-dasharray="8 6" opacity="0.2"/>

  <!-- Inner circle -->
  <circle cx="128" cy="128" r="42" fill="#F8F7FA"/>

  <!-- Sales velocity arc -->
  <path d="M60 172 Q60 100 128 76 Q196 52 196 116"
        fill="none" stroke="#3B82F6" stroke-width="6" stroke-linecap="round" opacity="0.15"/>

  <!-- Forecast track -->
  <path d="M68 152 L108 126 L148 106 L184 94"
        fill="none" stroke="#2F3349" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 3 Status lights -->
  <circle cx="68" cy="152" r="9" fill="#28C76F"/>
  <circle cx="68" cy="152" r="3.5" fill="#FFFFFF"/>

  <circle cx="108" cy="126" r="9" fill="#FF9F43"/>
  <circle cx="108" cy="126" r="3.5" fill="#FFFFFF"/>

  <circle cx="148" cy="106" r="9" fill="#FF4C51"/>
  <circle cx="148" cy="106" r="3.5" fill="#FFFFFF"/>

  <!-- Forecast endpoint -->
  <circle cx="184" cy="94" r="11" fill="#00BAD1"/>
  <circle cx="184" cy="94" r="4.5" fill="#FFFFFF"/>

  <!-- Pulse ring -->
  <circle cx="184" cy="94" r="18" fill="none" stroke="#00BAD1" stroke-width="3" opacity="0.35"/>

  <!-- WooCommerce tag (bottom right) -->
  <rect x="176" y="174" width="24" height="16" rx="3" fill="none" stroke="#3B82F6" stroke-width="2.5" opacity="0.5"/>
  <circle cx="188" cy="180" r="2" fill="#3B82F6" opacity="0.5"/>

  <!-- Product box (bottom left) -->
  <rect x="56" y="174" width="20" height="20" rx="4" fill="#28C76F" opacity="0.7"/>
  <line x1="56" y1="180" x2="76" y2="180" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>

</svg>